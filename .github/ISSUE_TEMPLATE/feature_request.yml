name: Feature request
description: Suggest an improvement or a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Proximo aims for a least-privilege, audited, trustworthy surface. Features that weaken
        the safe defaults are unlikely to land — but a well-scoped, opt-in, audited capability
        is genuinely welcome.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This keeps the safe defaults (API-only by default, exec opt-in, every mutation planned + audited)
