version: 2
updates:
  # Keep GitHub Actions current — in particular the SHA-pinned privileged actions
  # in release.yml (login / build-push / attest), which sign and publish the image.
  # Dependabot bumps both the pinned SHA and its `# vN` comment as new releases land.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
