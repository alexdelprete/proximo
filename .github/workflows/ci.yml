name: CI

on:
  push:
    branches: [main]
  pull_request:

# Explicit read-only floor (fork PRs already get this, but be unambiguous).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q -ra

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check version consistency (pyproject == __init__ == CHANGELOG)
        run: python scripts/version_tools.py check   # stdlib only, no install needed

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so gitleaks scans commits, not just the tree
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        # Free for individual accounts — no GITLEAKS_LICENSE needed. GITHUB_TOKEN is
        # required to scan pull requests (gitleaks-action v2 breaking change).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    runs-on: ubuntu-latest
    # Blocking gate. The dependency baseline is clean (verified 2026-06-24, after
    # bumping cryptography/starlette/pydantic-settings off their advisories). A new CVE
    # in a dependency now reds CI until it's patched — which is the point of the gate.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Audit dependencies for known CVEs
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          local: true
