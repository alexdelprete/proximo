name: CI

on:
  push:
    branches: [main]
  pull_request:

# Explicit read-only floor (fork PRs already get this, but be unambiguous).
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (hash-pinned lockfiles; the project itself --no-deps)
        run: |
          python -m pip install --require-hashes -r requirements/dev.txt -r requirements/build.txt
          python -m pip install --no-deps --no-build-isolation -e .
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q -ra

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Check version consistency (pyproject == __init__ == CHANGELOG == server.json)
        run: python scripts/version_tools.py check   # stdlib only, no install needed

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0   # full history so gitleaks scans commits, not just the tree
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        # Free for individual accounts — no GITLEAKS_LICENSE needed. GITHUB_TOKEN is
        # required to scan pull requests (gitleaks-action v2 breaking change).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pip-audit:
    runs-on: ubuntu-latest
    # Blocking gate. The dependency baseline is clean (verified 2026-06-24, after
    # bumping cryptography/starlette/pydantic-settings off their advisories). A new CVE
    # in a dependency now reds CI until it's patched — which is the point of the gate.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Audit dependencies for known CVEs
        uses: pypa/gh-action-pip-audit@1220774d901786e6f652ae159f7b6bc8fea6d266 # v1.1.0
        with:
          local: true
