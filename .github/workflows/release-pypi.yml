name: Release — PyPI (Trusted Publishing)

# Tokenless publish to PyPI via OIDC, gated behind the `pypi` Environment's
# required-reviewer rule (John approves before anything goes public).
#   - real release: when a GitHub Release is published
#   - dry run:      workflow_dispatch -> TestPyPI (prove the OIDC path first)
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Where to publish"
        required: true
        default: testpypi
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release upload of the SBOM (read is enough for everything else)
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify tag == version == CHANGELOG top heading (real releases only)
        if: github.event_name == 'release'
        run: python scripts/version_tools.py release-check "${GITHUB_REF_NAME#v}"

      - name: Build sdist + wheel
        run: |
          python -m pip install build
          python -m build

      # Receipts: a CycloneDX SBOM for the *published wheel's* dependency tree —
      # generated from a clean venv with exactly the wheel installed, kept OUT of
      # dist/ so the PyPI publish step never sees it. (The container image already
      # ships an SPDX SBOM; this covers the pip/uvx install path.)
      - name: Generate CycloneDX SBOM for the wheel
        run: |
          python -m venv /tmp/sbom-env
          /tmp/sbom-env/bin/pip install --quiet dist/*.whl cyclonedx-bom
          mkdir -p sbom
          /tmp/sbom-env/bin/python -m cyclonedx_py environment --of JSON \
            -o "sbom/proximo-proxmox-${GITHUB_REF_NAME#v}-sbom.cdx.json" /tmp/sbom-env/bin/python

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom/

      - name: Attach SBOM to the GitHub release (real releases only)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" sbom/*.cdx.json --clobber

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write   # OIDC — no token/secret
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment: pypi    # required-reviewer rule pauses here for John's approval
    permissions:
      id-token: write    # OIDC — no token/secret
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
