name: OpenSSF Scorecard

# Supply-chain posture scoring: branch protection, pinned dependencies, token
# permissions, dangerous workflow patterns, SAST coverage, and more. Publishes the
# score to the public OpenSSF Scorecard dashboard (powers the badge). It deliberately
# does NOT upload findings to the GitHub Security tab — those are posture
# *recommendations*, not vulnerabilities, and several conflict with this repo's
# intentional convention of floating first-party GitHub Actions (see release.yml). The
# Security tab stays focused on actual vulnerabilities (CodeQL + Trivy). Informational —
# it scores the repo's practices; it does not gate the build.
on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 1"   # weekly, Monday 05:23 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # publish results to the public Scorecard API (the badge)
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true   # -> OpenSSF dashboard/badge; NOT uploaded to the Security tab
