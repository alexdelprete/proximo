name: OpenSSF Scorecard

# Supply-chain posture scoring: branch protection, pinned dependencies, token
# permissions, dangerous workflow patterns, SAST coverage, and more. Publishes to the
# public Scorecard dashboard and uploads findings to the Security tab. Informational —
# it scores the repo's practices; it does not gate the build.
on:
  branch_protection_rule:
  schedule:
    - cron: "23 5 * * 1"   # weekly, Monday 05:23 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish results to the public Scorecard API
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
